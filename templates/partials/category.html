<style>
    a{
        text-decoration: none;
    }
    .category-section{
        padding: 60px 0;
    }

    .section-title{
        text-align: center;
        margin-bottom: 50px;
    }

    .section-title h2{
        font-size: 2.5rem;
        font-weight: 700;
        color: #0f172a;
    }

    .section-title p{
        color: #64748b;
        margin-top: 10px;
        font-size: 1rem;
    }

    .category-card{
        background: white;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        transition: 0.3s;
        height: 100%;
    }

    .category-card:hover{
        transform: translateY(-8px);
        box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .category-image{
        width: 100%;
        height: 250px;
        object-fit: cover;
    }

    .category-content{
        padding: 22px;
        text-align: center;
    }

    .category-name{
        font-size: 1.4rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 10px;
    }

    .category-description{
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
    }

</style>


<section class="category-section">

    <div class="container">

        <!-- Section Heading -->
        <div class="section-title">

            <h2>
                Explore Vehicle Categories
            </h2>

            <p>
                Choose from a wide range of vehicles for your perfect ride
            </p>

        </div>

        <!-- Categories Row -->
        <div class="row g-4">

            {% for category in categories %}

            <div class="col-12 col-md-6 col-lg-4">
                <a href="{% url 'all_vehicles' %}?category={{category.slug}}">
                <div class="category-card">

                    <!-- Category Image -->
                    <img 
                        src="{{ category.image.url }}" 
                        alt="{{ category.name }}"
                        class="category-image"
                    >

                    <!-- Category Content -->
                    <div class="category-content">

                        <h3 class="category-name">
                            {{ category.name }}
                        </h3>

                        <p class="category-description">
                            {{ category.description|truncatewords:15 }}
                        </p>

                    </div>

                </div>
                </a>
            </div>

            {% empty %}

            <div class="col-12 text-center">

                <h4>No Categories Available</h4>

            </div>

            {% endfor %}

        </div>

    </div>

</section>

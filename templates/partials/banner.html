<!-- =========================
        HERO BANNER SECTION
========================== -->

<style>

    .hero-slider{
        margin-top: 30px;
    }

    .hero-banner{
        height: 520px;
        border-radius: 28px;
        overflow: hidden;
        position: relative;
    }

    .hero-banner img{
        width: 100%;
        height: 520px;
        object-fit: cover;
    }

    .banner-overlay{
        position: absolute;
        inset: 0;
        background: linear-gradient(
            to right,
            rgba(0,0,0,0.75),
            rgba(0,0,0,0.25)
        );
        display: flex;
        align-items: center;
    }

    .banner-content{
        max-width: 650px;
        padding-left: 70px;
        color: white;
    }

    .banner-content h1{
        font-size: 3.5rem;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 20px;
    }

    .banner-content p{
        font-size: 1.1rem;
        color: #e2e8f0;
        margin-bottom: 30px;
        line-height: 1.8;
    }

    .banner-btn{
        display: inline-block;
        padding: 14px 32px;
        border-radius: 50px;
        background: linear-gradient(135deg,#ff6b00,#ff8c42);
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(255,107,0,0.35);
    }

    .banner-btn:hover{
        transform: translateY(-4px);
        color: white;
    }

    /* Carousel Controls */

    .carousel-control-prev,
    .carousel-control-next{
        width: 60px;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon{
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background-color: rgba(255,255,255,0.25);
        backdrop-filter: blur(8px);
        background-size: 50%;
    }

    /* Indicators */

    .carousel-indicators [data-bs-target]{
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin: 0 6px;
        background-color: #fff;
    }

    /* Responsive */

    @media(max-width:991px){

        .hero-banner{
            height: 450px;
        }

        .hero-banner img{
            height: 450px;
        }

        .banner-content{
            padding: 30px;
        }

        .banner-content h1{
            font-size: 2.5rem;
        }

    }

    @media(max-width:576px){

        .hero-banner{
            height: 400px;
        }

        .hero-banner img{
            height: 400px;
        }

        .banner-content{
            padding: 20px;
        }

        .banner-content h1{
            font-size: 1.8rem;
        }

        .banner-content p{
            font-size: 0.95rem;
        }

        .banner-btn{
            padding: 12px 24px;
            font-size: 14px;
        }

    }

</style>


<section class="hero-slider container">

    <div 
        id="bannerCarousel" 
        class="carousel slide carousel-fade"
        data-bs-ride="carousel"
        data-bs-interval="4000"
    >

        <!-- Indicators -->
         <!-- Bootstrap carousels require exactly one slide to have the active class when the page loads. hear first active for dots and in bottom second active for banner -->
        <div class="carousel-indicators">

            {% for banner in banners %}

                <button 
                    type="button"
                    data-bs-target="#bannerCarousel"
                    data-bs-slide-to="{{ forloop.counter0 }}"
                    class="{% if forloop.first %}active{% endif %}">
                </button>

            {% endfor %}

        </div>

        <!-- Slides -->
        <div class="carousel-inner">

            {% for banner in banners %}

            <div class="carousel-item {% if forloop.first %}active{% endif %}">

                <!-- Clickable Banner -->
                <a href="{{ banner.button_link|default:'#' }}">

                    <div class="hero-banner">

                        <!-- Banner Image -->
                        <img 
                            src="{{ banner.image.url }}" 
                            alt="{{ banner.title }}"
                        >

                        <!-- Overlay -->
                        <div class="banner-overlay">

                            <div class="banner-content">

                                <h1>
                                    {{ banner.title }}
                                </h1>

                                <p>
                                    {{ banner.subtitle }}
                                </p>

                                {% if banner.button_link %}

                                <span class="banner-btn">

                                    Explore Now

                                </span>

                                {% endif %}

                            </div>

                        </div>

                    </div>

                </a>

            </div>

            {% empty %}

            <div class="carousel-item active">

                <div class="hero-banner">

                    <img 
                        src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop" 
                        alt="Default Banner"
                    >

                    <div class="banner-overlay">

                        <div class="banner-content">

                            <h1>
                                Welcome to TaRunTime
                            </h1>

                            <p>
                                Book premium vehicles anytime, anywhere with ease.
                            </p>

                            <a href="#" class="banner-btn">

                                Explore Vehicles

                            </a>

                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

        <!-- Previous Button -->
        <button 
            class="carousel-control-prev"
            type="button"
            data-bs-target="#bannerCarousel"
            data-bs-slide="prev"
        >

            <span class="carousel-control-prev-icon"></span>

        </button>

        <!-- Next Button -->
        <button 
            class="carousel-control-next"
            type="button"
            data-bs-target="#bannerCarousel"
            data-bs-slide="next"
        >

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</section>
